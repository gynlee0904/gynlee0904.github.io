<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>gynlee | Developer Portfolio</title>
        <meta name="description" content="사용자 경험과 코드 품질 모두를 중시하는 개발자 gynlee의 포트폴리오" />
        <meta property="og:title" content="LeeGiyun | Developer Portfolio" />
        <meta property="og:description" content="사용자 경험과 코드 품질 모두를 중시하는 개발자" />
        <meta property="og:type" content="website" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --bg: #0f172a;
                --surface: #1e293b;
                --border: #334155;
                --text: #f8fafc;
                --muted: #94a3b8;
                --accent: #378add;
            }

            html {
                scroll-behavior: smooth;
            }

            body {
                background: var(--bg);
                color: var(--text);
                font-family: "Inter", sans-serif;
                font-size: 16px;
                line-height: 1.7;
            }

            /* ── Layout ── */
            .container {
                max-width: 1100px;
                margin: 0 auto;
                padding: 0 24px;
            }

            section {
                padding: 96px 0;
            }

            /* ── Fade-in ── */
            .fade-in {
                opacity: 0;
                transform: translateY(24px);
                transition:
                    opacity 0.6s ease,
                    transform 0.6s ease;
            }
            .fade-in.visible {
                opacity: 1;
                transform: none;
            }

            /* ── Nav ── */
            nav {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                z-index: 100;
                background: rgba(15, 23, 42, 0.85);
                backdrop-filter: blur(12px);
                border-bottom: 1px solid var(--border);
            }
            nav .container {
                display: flex;
                align-items: center;
                justify-content: space-between;
                height: 60px;
            }
            .nav-logo {
                font-weight: 700;
                color: var(--accent);
                font-family: "JetBrains Mono", monospace;
                text-decoration: none;
                font-size: 18px;
            }
            .nav-links {
                display: flex;
                gap: 32px;
                list-style: none;
            }
            .nav-links a {
                color: var(--muted);
                text-decoration: none;
                font-size: 14px;
                transition: color 0.2s;
            }
            .nav-links a:hover {
                color: var(--text);
            }

            /* ── Hero ── */
            #hero {
                min-height: 100vh;
                display: flex;
                align-items: center;
                padding-top: 60px;
                background-image: radial-gradient(circle at 20% 50%, rgba(55, 138, 221, 0.06) 0%, transparent 60%);
            }
            .hero-label {
                display: inline-block;
                font-family: "JetBrains Mono", monospace;
                font-size: 14px;
                color: var(--accent);
                margin-bottom: 16px;
            }
            .hero-title {
                font-size: clamp(40px, 6vw, 64px);
                font-weight: 700;
                line-height: 1.15;
                margin-bottom: 16px;
            }
            .hero-title span {
                color: var(--accent);
            }
            .hero-sub {
                font-size: 18px;
                color: var(--muted);
                max-width: 520px;
                margin-bottom: 40px;
            }
            .btn-group {
                display: flex;
                gap: 16px;
                flex-wrap: wrap;
            }
            .btn {
                padding: 12px 28px;
                border-radius: 8px;
                font-size: 15px;
                font-weight: 600;
                text-decoration: none;
                transition:
                    opacity 0.2s,
                    transform 0.2s;
                display: inline-block;
            }
            .btn:hover {
                opacity: 0.85;
                transform: translateY(-2px);
            }
            .btn-primary {
                background: var(--accent);
                color: #fff;
            }
            .btn-outline {
                border: 1px solid var(--border);
                color: var(--text);
                background: transparent;
            }

            /* ── Section title ── */
            .section-title {
                font-size: clamp(24px, 3vw, 32px);
                font-weight: 600;
                margin-bottom: 48px;
                display: flex;
                align-items: center;
                gap: 16px;
            }
            .section-title::after {
                content: "";
                flex: 1;
                height: 1px;
                background: var(--border);
            }
            .section-num {
                font-family: "JetBrains Mono", monospace;
                color: var(--accent);
                font-size: 14px;
            }

            /* ── Skills ── */
            .skills-groups {
                display: flex;
                flex-direction: column;
                gap: 28px;
            }
            .skill-category {
                font-size: 13px;
                color: var(--muted);
                margin-bottom: 12px;
                font-family: "JetBrains Mono", monospace;
            }
            .tags {
                display: flex;
                flex-wrap: wrap;
                gap: 10px;
            }
            .tag {
                background: var(--surface);
                border: 1px solid var(--border);
                color: var(--text);
                padding: 6px 16px;
                border-radius: 999px;
                font-size: 14px;
            }

            /* ── Projects ── */
            .projects-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 24px;
            }
            .project-card {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 12px;
                padding: 28px;
                display: flex;
                flex-direction: column;
                gap: 14px;
                transition:
                    border-color 0.2s,
                    transform 0.2s;
            }
            .project-card:hover {
                border-color: var(--accent);
                transform: translateY(-4px);
            }
            .project-name {
                font-size: 20px;
                font-weight: 600;
            }
            .project-desc {
                color: var(--muted);
                font-size: 15px;
            }
            .project-role {
                font-size: 13px;
                color: var(--accent);
                font-family: "JetBrains Mono", monospace;
            }
            .project-result {
                font-size: 14px;
                color: var(--muted);
                background: rgba(55, 138, 221, 0.08);
                border-left: 2px solid var(--accent);
                padding: 8px 12px;
                border-radius: 0 6px 6px 0;
            }
            .project-links {
                display: flex;
                gap: 16px;
                margin-top: auto;
            }
            .project-links a {
                font-size: 13px;
                color: var(--muted);
                text-decoration: none;
                transition: color 0.2s;
            }
            .project-links a:hover {
                color: var(--accent);
            }

            /* ── About ── */
            .about-text {
                max-width: 680px;
                color: var(--muted);
                font-size: 17px;
                line-height: 1.8;
            }
            .about-text p + p {
                margin-top: 16px;
            }
            .about-text strong {
                color: var(--text);
            }

            /* ── Contact ── */
            #contact {
                text-align: center;
            }
            .contact-desc {
                color: var(--muted);
                font-size: 17px;
                max-width: 480px;
                margin: 0 auto 36px;
            }
            .social-links {
                display: flex;
                justify-content: center;
                gap: 24px;
                margin-top: 32px;
                flex-wrap: wrap;
            }
            .social-links a {
                color: var(--muted);
                text-decoration: none;
                font-size: 14px;
                font-family: "JetBrains Mono", monospace;
                transition: color 0.2s;
            }
            .social-links a:hover {
                color: var(--accent);
            }

            /* ── Footer ── */
            footer {
                border-top: 1px solid var(--border);
                padding: 32px 0;
                text-align: center;
                color: var(--muted);
                font-size: 13px;
                font-family: "JetBrains Mono", monospace;
            }

            /* ── Responsive ── */
            @media (max-width: 640px) {
                .projects-grid {
                    grid-template-columns: 1fr;
                }
                .nav-links {
                    display: none;
                }
            }
        </style>
    </head>
    <body>
        <!-- Nav -->
        <nav>
            <div class="container">
                <a href="#hero" class="nav-logo">gynlee</a>
                <ul class="nav-links">
                    <li><a href="#skills">Skills</a></li>
                    <li><a href="#projects">Projects</a></li>
                    <li><a href="#about">About</a></li>
                    <li><a href="#contact">Contact</a></li>
                </ul>
            </div>
        </nav>

        <!-- Hero -->
        <section id="hero">
            <div class="container fade-in" id="hero-content"></div>
        </section>

        <!-- Skills -->
        <section id="skills">
            <div class="container">
                <h2 class="section-title fade-in"><span class="section-num">01.</span> Skills</h2>
                <div class="skills-groups fade-in" id="skills-content"></div>
            </div>
        </section>

        <!-- Projects -->
        <section id="projects">
            <div class="container">
                <h2 class="section-title fade-in"><span class="section-num">02.</span> Projects</h2>
                <div class="projects-grid" id="projects-content"></div>
            </div>
        </section>

        <!-- About -->
        <section id="about">
            <div class="container">
                <h2 class="section-title fade-in"><span class="section-num">03.</span> About</h2>
                <div class="about-text fade-in" id="about-content"></div>
            </div>
        </section>

        <!-- Contact -->
        <section id="contact">
            <div class="container" id="contact-content"></div>
        </section>

        <footer>
            <div class="container">
                <p>© 2026 gynlee · Built with HTML &amp; CSS</p>
            </div>
        </footer>

        <script src="data.js"></script>
        <script>
            function renderHero() {
                document.getElementById("hero-content").innerHTML = `
                    <span class="hero-label">// Hello, World!</span>
                    <h1 class="hero-title">안녕하세요,<br /><span>${DATA.hero.name}</span>입니다.</h1>
                    <p class="hero-sub">${DATA.hero.tagline}</p>
                    <div class="btn-group">
                        <a href="#projects" class="btn btn-primary">프로젝트 보기</a>
                        <a href="#" class="btn btn-outline">이력서 다운로드</a>
                    </div>`;
            }

            function renderSkills() {
                document.getElementById("skills-content").innerHTML = DATA.skills
                    .map(
                        (group) => `
                    <div>
                        <p class="skill-category">// ${group.category}</p>
                        <div class="tags">
                            ${group.items.map((item) => `<span class="tag">${item}</span>`).join("")}
                        </div>
                    </div>`,
                    )
                    .join("");
            }

            function renderProjects() {
                document.getElementById("projects-content").innerHTML = DATA.projects
                    .map((p) => {
                        const links = [
                            p.github ? `<a href="${p.github}" target="_blank" rel="noopener">GitHub →</a>` : "",
                            p.demo ? `<a href="${p.demo}" target="_blank" rel="noopener">Live Demo →</a>` : "",
                        ]
                            .filter(Boolean)
                            .join("");
                        return `
                    <div class="project-card fade-in">
                        <h3 class="project-name">${p.name}</h3>
                        <p class="project-desc">${p.desc}</p>
                        <div class="tags">${p.stack.map((s) => `<span class="tag">${s}</span>`).join("")}</div>
                        <p class="project-role">기여: ${p.role}</p>
                        <p class="project-result">${p.result}</p>
                        <div class="project-links">${links}</div>
                    </div>`;
                    })
                    .join("");
            }

            function renderAbout() {
                document.getElementById("about-content").innerHTML = DATA.about
                    .map((p) => `<p>${p}</p>`)
                    .join("");
            }

            function renderContact() {
                const linkedin = DATA.contact.linkedin
                    ? `<a href="${DATA.contact.linkedin}" target="_blank" rel="noopener">LinkedIn</a>`
                    : "";
                document.getElementById("contact-content").innerHTML = `
                    <h2 class="section-title fade-in"><span class="section-num">04.</span> Contact</h2>
                    <p class="contact-desc fade-in">새로운 기회나 협업 제안을 환영합니다.<br />편하게 연락 주세요.</p>
                    <a href="mailto:${DATA.contact.email}" class="btn btn-primary fade-in">이메일 보내기</a>
                    <div class="social-links fade-in">
                        <a href="${DATA.contact.github}" target="_blank" rel="noopener">${DATA.contact.github.replace("https://", "")}</a>
                        ${linkedin}
                    </div>`;
            }

            renderHero();
            renderSkills();
            renderProjects();
            renderAbout();
            renderContact();

            const observer = new IntersectionObserver(
                (entries) =>
                    entries.forEach((e) => {
                        if (e.isIntersecting) e.target.classList.add("visible");
                    }),
                { threshold: 0.12 },
            );
            document.querySelectorAll(".fade-in").forEach((el) => observer.observe(el));
        </script>
    </body>
</html>
